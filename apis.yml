aid: deepchecks
url: https://raw.githubusercontent.com/api-evangelist/deepchecks/refs/heads/main/apis.yml
name: Deepchecks
kind: company
description: Deepchecks is an ML and LLM testing, evaluation, and monitoring platform.
  Its cloud LLM Evaluation product exposes a REST API for logging LLM interactions,
  managing applications and versions, retrieving annotations, and configuring evaluation
  properties, while its open-source Python packages provide continuous validation of
  tabular, computer-vision, and LLM data and models.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- LLM
- Evaluation
- Testing
- Monitoring
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
